name: collect

on:
  schedule:
    # 매일 08:15 KST (= 23:15 UTC 전날) 오전용 수집 — 08:25 KST 브리핑 10분 전
    - cron: "15 23 * * *"
    # 매일 17:15 KST (= 08:15 UTC) 오후용 수집 — 17:25 KST 브리핑 10분 전
    - cron: "15 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run collector
        run: |
          TZ=Asia/Seoul python3 -m pipeline.collect > /tmp/source_stats.json
          echo "--- source_stats ---"
          cat /tmp/source_stats.json
      - name: Commit candidates
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add state/candidates.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "collect: candidates $(TZ=Asia/Seoul date +%Y-%m-%d_%H:%M_KST)"
            git push origin HEAD:main
          fi
