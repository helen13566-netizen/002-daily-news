name: publish

on:
  workflow_dispatch:
    inputs:
      period:
        description: "오전 | 오후"
        required: true
        default: "오전"
      issue_number:
        description: "ISSUE 번호"
        required: true

permissions:
  contents: write
  pages: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Verify analyzed.json present
        run: |
          if [ ! -s state/analyzed.json ]; then
            echo "❌ state/analyzed.json 이 비어있거나 없음 — agent 가 먼저 업로드해야 합니다"
            exit 1
          fi
          echo "--- analyzed.json head ---"
          head -c 2000 state/analyzed.json
      - name: Render HTML
        run: |
          TZ=Asia/Seoul python3 -m pipeline.run render
      - name: Mark pipeline success in state.json
        run: |
          TZ=Asia/Seoul python3 -m pipeline.run mark-success
      - name: Commit docs + archive + state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/ archive/ state/state.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "news: ISSUE #${{ inputs.issue_number }} ${{ inputs.period }} 브리핑 $(TZ=Asia/Seoul date +%Y-%m-%d_%H:%M)"
            git push origin HEAD:main
          fi
